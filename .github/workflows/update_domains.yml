name: Update Domains

on:
  schedule:
    # Ogni 15 minuti dalle 06:00 alle 23:59 UTC
    - cron: "*/15 6-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Check domains
        run: python check_domains.py
        env:
          DOMAINS_FILE: domains.json

      - name: Commit domains.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add domains.json

          if ! git diff --cached --quiet; then
            git commit -m "chore: update domains [skip ci]"
            git push
          else
            echo "No changes detected"
          fi
