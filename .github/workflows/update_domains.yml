name: Update Domains

on:
  schedule:
    - cron: "*/15 6-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-domains
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check domains
        run: python check_domains.py
        env:
          DOMAINS_FILE: domains.json
          PYTHONIOENCODING: utf-8

      - name: Commit domains.json if changed
        id: commit
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            git add domains.json
            if git diff --cached --quiet; then
              echo "No changes detected"
              echo "pushed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git commit -m "chore: update domains [skip ci]"

            if git push origin "HEAD:${BRANCH}"; then
              echo "pushed"
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "push respinto: riparto dal remote e ricalcolo ($i)..."
            git fetch origin "${BRANCH}"
            git reset --hard FETCH_HEAD
            python check_domains.py
          done

          echo "push fallito dopo 3 tentativi"
          exit 1

      - name: Invalidate Worker cache
        if: steps.commit.outputs.pushed == 'true'
        run: |
          curl -sf -X POST https://domains-tracker.server66.workers.dev/cache/invalidate \
            -H "Authorization: Bearer ${{ secrets.WORKER_AUTH_TOKEN }}" \
            || echo "Cache invalidation failed (non-fatal)"
