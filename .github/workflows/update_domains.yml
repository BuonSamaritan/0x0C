name: Update Domains

on:
  schedule:
    # Ogni 15 minuti dalle 06:00 alle 23:59 UTC
    - cron: "*/15 6-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check domains
        run: python check_domains.py
        env:
          DOMAINS_FILE: domains.json
          PYTHONIOENCODING: utf-8

      - name: Commit domains.json if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add domains.json
          if git diff --cached --quiet; then
            echo "No changes detected"
            echo "pushed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "chore: update domains [skip ci]"

          # Il Worker (POST/PUT/DELETE /domains) puo' committare in parallelo: se il
          # remote e' avanzato il push viene respinto -> rebase e riprova.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed"
              echo "pushed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "push respinto, rebase e riprovo ($i)..."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || { echo "rebase fallito"; exit 1; }
          done
          echo "push fallito dopo 5 tentativi"
          exit 1

      - name: Invalidate Worker cache
        if: steps.commit.outputs.pushed == 'true'
        run: |
          curl -sf -X POST https://domains-tracker.server66.workers.dev/cache/invalidate \
            -H "Authorization: Bearer ${{ secrets.WORKER_AUTH_TOKEN }}" \
            || echo "Cache invalidation failed (non-fatal)"
